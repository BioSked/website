title = "BioSked website secret scanning"

[extend]
useDefault = true

[allowlist]
description = "Browser-visible HubSpot form UUIDs are public identifiers, not credentials."
regexTarget = "line"
regexes = [
  '''HUBSPOT_FORM_ID\s*=\s*["'][0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}["']'''
]
